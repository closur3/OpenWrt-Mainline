name: OpenWrt Builder

on:
  repository_dispatch:
    types: [OpenWrt Builder]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Connection To Actions'
        type: boolean
        required: false
        default: false

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DDNS_DOMAIN: ${{ vars.DDNS_DOMAIN }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: |
            /etc/apt/sources.list.d
            /usr/share/swift
            /usr/share/miniconda
            /usr/share/az*
            /usr/local/lib/node_modules
            /usr/local/share/chromium
            /usr/local/share/powershell
            /usr/local/julia
            /usr/local/aws-cli
            /usr/local/aws-sam-cli
            /usr/share/gradle
            /var/lib/docker
            /var/lib/containerd
          testing: false

      - name: Prepare Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -s https://raw.githubusercontent.com/immortalwrt/build-scripts/master/init_build_environment.sh)'
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Load Source Metadata
        run: |
          ruby <<'RUBY' >> "$GITHUB_ENV"
            require "yaml"

            repo = YAML.load_file(".repo")
            source = repo.fetch("source")
            puts "SOURCE_NAME=#{source.fetch("name")}"
            puts "SOURCE_URL=#{source.fetch("url")}"
            puts "SOURCE_TAG=#{source.fetch("tag")}"
          RUBY

      - name: Clone Tracked Source
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone "$SOURCE_URL" -b "$SOURCE_TAG" openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          COMMIT_HASH=$(git -C "$GITHUB_WORKSPACE" rev-parse --short=7 HEAD)
          FIRMWARE_VERSION_ID="$(date +%y.%m.%d)-${COMMIT_HASH}"
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "FIRMWARE_VERSION_ID=$FIRMWARE_VERSION_ID" >> $GITHUB_ENV

      - name: Restore Build Cache
        uses: klever1988/cachewrtbuild@main
        with:
          ccache: true
          prefix: ${{ github.workspace }}/openwrt

      - name: Load Custom Feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update And Install Feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Render Repository Variables
        run: |
          ruby <<'RUBY'
            domain = ENV.fetch("DDNS_DOMAIN").strip
            abort("Repository variable DDNS_DOMAIN is required") if domain.empty?
            abort("Repository variable DDNS_DOMAIN must be a domain name") unless domain.match?(/\A[a-z0-9.-]+\z/i)

            ddns_rule = "files/etc/mosdns/rule/ddnslist.txt"
            mosdns_config = "files/etc/config/mosdns"

            File.write(ddns_rule, "#{domain}\n")
            File.write(mosdns_config, File.read(mosdns_config).gsub("{{DDNS_DOMAIN}}", domain))
          RUBY

      - name: Load Custom Configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH Connection To Actions
        uses: P3TERX/ssh2actions@main
        if: github.event.inputs.ssh == 'true'

      - name: Download Source Packages
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Check Space Usage
        if: (!cancelled())
        run: df -hT

      - name: Prepare Release Metadata
        id: version
        run: |
          ruby <<'RUBY' >> "$GITHUB_ENV"
            source_name = ENV.fetch("SOURCE_NAME")
            source_tag = ENV.fetch("SOURCE_TAG")
            version = source_tag.sub(/^#{Regexp.escape(source_name)}-/i, "")
            base_version = version.sub(/-rc[0-9]*/, "")
            build_date = Time.now.strftime("%Y.%m.%d_%H%M")

            puts "VER_FULL=#{version}"
            puts "VER_BASE=#{base_version}"
            puts "BUILD_DATE=#{build_date}"
            puts "RELEASE_TAG=#{source_name}-#{version}_#{build_date}"
          RUBY

      - name: Prepare Firmware Artifacts
        id: organize
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "${FIRMWARE_VERSION_ID}" >> version.buildinfo
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload Firmware To Release
        uses: softprops/action-gh-release@v3
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.FIRMWARE }}/*

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: openwrt-builder.yml

      - name: Cleanup Expired Releases
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REPO="${{ github.repository }}"

          releases=$(gh release list --repo "$REPO" --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[].tagName')

          declare -A seen

          while IFS= read -r tag; do
            prefix="${SOURCE_NAME}-"
            [[ "$tag" == "$prefix"* ]] || continue

            version="${tag#$prefix}"
            base="${version%%_*}"
            base="${base%%-rc*}"

            if [[ "$base" == "$VER_BASE" ]]; then
              limit=2
            else
              limit=1
            fi

            count=${seen[$base]:-0}
            if (( count < limit )); then
              seen[$base]=$((count + 1))
            else
              echo "Deleting: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
            fi
          done <<< "$releases"
