name: OpenWrt Builder

on:
  repository_dispatch:
    types: [OpenWrt Builder]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Connection To Actions'
        type: boolean
        required: false
        default: false

permissions:
  actions: write
  contents: write

concurrency:
  group: openwrt-builder
  cancel-in-progress: false

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.client_payload.config_commit || github.sha }}
          persist-credentials: false

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: |
            /etc/apt/sources.list.d
            /usr/share/swift
            /usr/share/miniconda
            /usr/share/az*
            /usr/local/lib/node_modules
            /usr/local/share/chromium
            /usr/local/share/powershell
            /usr/local/julia
            /usr/local/aws-cli
            /usr/local/aws-sam-cli
            /usr/share/gradle
            /var/lib/docker
            /var/lib/containerd
          testing: false

      - name: Prepare Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/init_build_environment.sh \
            https://raw.githubusercontent.com/immortalwrt/build-scripts/master/init_build_environment.sh
          sudo bash /tmp/init_build_environment.sh
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir
          python3 -m pip install 'ruamel.yaml==0.19.1'
          python3 .github/scripts/repository-inputs.py github-env source >> "$GITHUB_ENV"

      - name: Fetch OpenWrt Source
        working-directory: /workdir
        run: |
          df -hT "$PWD"
          [[ "$SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          git init -q openwrt
          git -C openwrt remote add origin "$SOURCE_URL"
          git -C openwrt fetch --depth=1 origin "$SOURCE_COMMIT"
          git -C openwrt -c advice.detachedHead=false checkout --detach FETCH_HEAD
          [[ "$(git -C openwrt rev-parse HEAD)" == "$SOURCE_COMMIT" ]]
          ln -s /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
          COMMIT_HASH=$(git -C "$GITHUB_WORKSPACE" rev-parse --short=7 HEAD)
          FIRMWARE_VERSION_ID="$(date +%y.%m.%d)-${COMMIT_HASH}"
          echo "COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
          echo "FIRMWARE_VERSION_ID=$FIRMWARE_VERSION_ID" >> "$GITHUB_ENV"

      - name: Restore Build Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          prefix: ${{ github.workspace }}/openwrt

      - name: Prepare Feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Custom Packages
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: Connect to GitHub Actions via SSH
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'

      - name: Download Source Packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        run: |
          cd openwrt
          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s

      - name: Check Disk Space Usage
        if: (!cancelled())
        run: df -hT

      - name: Prepare Firmware Release
        id: organize
        run: |
          RELEASE_VERSION="${SOURCE_TAG:-$SOURCE_BRANCH}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${SOURCE_NAME}-${RELEASE_VERSION}_$(date +%Y.%m.%d_%H%M)" >> "$GITHUB_ENV"
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "${FIRMWARE_VERSION_ID}" >> version.buildinfo
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Publish Firmware Release
        uses: softprops/action-gh-release@v3
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.FIRMWARE }}/*

      - name: Cleanup Expired Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: openwrt-builder.yml

      - name: Cleanup Expired Releases
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Current release version $RELEASE_VERSION: keep 2 builds; other versions: keep 1 build"
          gh release list --limit 1000 --json tagName,createdAt \
            | jq -r --arg prefix "${SOURCE_NAME}-" --arg current "$RELEASE_VERSION" '
                map(select(.tagName | startswith($prefix)))
                | group_by(.tagName | ltrimstr($prefix) | split("_")[0])[]
                | sort_by(.createdAt) | reverse
                | .[(if (.[0].tagName | ltrimstr($prefix) | split("_")[0]) == $current then 2 else 1 end):]
                | .[].tagName
              ' \
            | while IFS= read -r tag; do
                echo "Deleting: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
