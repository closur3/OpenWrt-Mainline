name: OpenWrt Builder

on:
  repository_dispatch:
    types: [OpenWrt Builder]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Connection To Actions'
        type: boolean
        required: false
        default: false

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Ultimate Free Disk Space
        uses: endersonmenezes/free-disk-space@v1
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: |
            /etc/apt/sources.list.d
            /usr/share/swift
            /usr/share/miniconda
            /usr/share/az*
            /usr/local/lib/node_modules
            /usr/local/share/chromium
            /usr/local/share/powershell
            /usr/local/julia
            /usr/local/aws-cli
            /usr/local/aws-sam-cli
            /usr/share/gradle
            /var/lib/docker
            /var/lib/containerd
          testing: false

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -s https://raw.githubusercontent.com/immortalwrt/build-scripts/master/init_build_environment.sh)'
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Parse .repo File
        run: |
          while IFS='=' read -r config_key config_value; do
            [[ "$config_key" =~ ^# || -z "$config_key" ]] && continue
            clean_key=$(echo "$config_key" | xargs)
            clean_value=$(echo "$config_value" | xargs)
            [[ -n "$clean_key" ]] && echo "$clean_key=$clean_value" >> "$GITHUB_ENV"
          done < .repo

          SYS_PREFIX=$(grep -m1 '_URL=' .repo | sed 's/_URL=.*//' | xargs)
          echo "SYS_PREFIX=$SYS_PREFIX" >> "$GITHUB_ENV"

      - name: Clone Source Code
        working-directory: /workdir
        run: |
          df -hT $PWD
          SYS_URL="${SYS_PREFIX}_URL"
          SYS_TAG="${SYS_PREFIX}_TAG"
          git clone "${!SYS_URL}" -b "${!SYS_TAG}" openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Cache
        uses: klever1988/cachewrtbuild@v1
        with:
          ccache: true
          prefix: ${{ github.workspace }}/openwrt

      - name: Load Custom Feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update And Install Feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH Connection To Actions
        uses: P3TERX/ssh2actions@v1
        if: github.event.inputs.ssh == 'true'

      - name: Download Package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile The Firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Check Space Usage
        if: (!cancelled())
        run: df -hT

      - name: Parse Version
        id: version
        run: |
          SYS_TAG_VAR="${SYS_PREFIX}_TAG"
          CURRENT_TAG="${!SYS_TAG_VAR}"
          PREFIX_LOWER=$(echo "$SYS_PREFIX" | tr '[:upper:]' '[:lower:]')

          VER_FULL=$(echo "$CURRENT_TAG" | sed -E "s/^${PREFIX_LOWER}-//i")
          VER_BASE=$(echo "$VER_FULL" | sed 's/-rc[0-9]*//')
          BUILD_DATE="$(date +"%Y.%m.%d_%H%M")"
          RELEASE_TAG="${SYS_PREFIX}-${VER_FULL}_${BUILD_DATE}"

          echo "VER_FULL=$VER_FULL"       >> $GITHUB_ENV
          echo "VER_BASE=$VER_BASE"       >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE"   >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Organize Files
        id: organize
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload Firmware To Release
        uses: softprops/action-gh-release@v1
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.FIRMWARE }}/*

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: openwrt-builder.yml

      - name: Cleanup Expired Releases
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          VER_BASE="${{ env.VER_BASE }}"
          SYS_PREFIX="${{ env.SYS_PREFIX }}"
          SYS_PREFIX_ESC=$(printf '%s' "$SYS_PREFIX" | sed 's/[.[\*^$(){}+?|]/\\&/g')

          releases=$(gh release list --repo "$REPO" --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[].tagName' \
            | grep "^${SYS_PREFIX_ESC}-")

          declare -A seen

          while IFS= read -r tag; do
            base=$(echo "$tag" | grep -oP "^${SYS_PREFIX_ESC}-\K[^_]+" | sed 's/-rc[0-9]*//')

            if [[ "$base" == "$VER_BASE" ]]; then
              limit=2
            else
              limit=1
            fi

            count=${seen[$base]:-0}
            if (( count < limit )); then
              seen[$base]=$((count + 1))
            else
              echo "Deleting: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
            fi
          done <<< "$releases"
