name: OpenWrt Builder

on:
  repository_dispatch:
    types: [OpenWrt Builder]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Connection To Actions'
        type: boolean
        required: false
        default: false

permissions:
  actions: write
  contents: write

concurrency:
  group: openwrt-builder
  cancel-in-progress: false

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DDNS_DOMAIN: ${{ vars.DDNS_DOMAIN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.client_payload.config_commit || github.sha }}
          persist-credentials: false

      - name: Verify Configuration Revision
        if: github.event_name == 'repository_dispatch'
        env:
          EXPECTED_COMMIT: ${{ github.event.client_payload.config_commit }}
        run: |
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Invalid configuration commit: $EXPECTED_COMMIT" >&2
            exit 1
          }
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: |
            /etc/apt/sources.list.d
            /usr/share/swift
            /usr/share/miniconda
            /usr/share/az*
            /usr/local/lib/node_modules
            /usr/local/share/chromium
            /usr/local/share/powershell
            /usr/local/julia
            /usr/local/aws-cli
            /usr/local/aws-sam-cli
            /usr/share/gradle
            /var/lib/docker
            /var/lib/containerd
          testing: false

      - name: Prepare Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/init_build_environment.sh \
            https://raw.githubusercontent.com/immortalwrt/build-scripts/master/init_build_environment.sh
          sudo bash /tmp/init_build_environment.sh
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir
          python3 -m pip install 'ruamel.yaml==0.19.1'
          python3 .github/scripts/repository-inputs.py github-env source >> "$GITHUB_ENV"

      - name: Clone Tracked Source
        working-directory: /workdir
        run: |
          df -hT "$PWD"
          [[ "$SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          git init -q openwrt
          git -C openwrt remote add origin "$SOURCE_URL"
          git -C openwrt fetch --depth=1 origin "$SOURCE_COMMIT"
          git -C openwrt -c advice.detachedHead=false checkout --detach FETCH_HEAD
          [[ "$(git -C openwrt rev-parse HEAD)" == "$SOURCE_COMMIT" ]]
          ln -s /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
          COMMIT_HASH=$(git -C "$GITHUB_WORKSPACE" rev-parse --short=7 HEAD)
          FIRMWARE_VERSION_ID="$(date +%y.%m.%d)-${COMMIT_HASH}"
          echo "COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
          echo "FIRMWARE_VERSION_ID=$FIRMWARE_VERSION_ID" >> "$GITHUB_ENV"

      - name: Restore Build Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          prefix: ${{ github.workspace }}/openwrt

      - name: Prepare Feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Custom Configuration
        run: |
          ruby <<'RUBY'
            domain = ENV.fetch("DDNS_DOMAIN").strip
            abort("Repository variable DDNS_DOMAIN is required") if domain.empty?
            abort("Repository variable DDNS_DOMAIN must be a domain name") unless domain.match?(/\A[a-z0-9.-]+\z/i)

            ddns_rule = "files/etc/mosdns/rule/ddnslist.txt"
            mosdns_config = "files/etc/config/mosdns"

            File.write(ddns_rule, "#{domain}\n")
            File.write(mosdns_config, File.read(mosdns_config).gsub("{{DDNS_DOMAIN}}", domain))
          RUBY
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: SSH Connection To Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'

      - name: Download Source Packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        run: |
          cd openwrt
          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s

      - name: Check Space Usage
        if: (!cancelled())
        run: df -hT

      - name: Prepare Release
        id: organize
        run: |
          ruby <<'RUBY' >> "$GITHUB_ENV"
            source_name = ENV.fetch("SOURCE_NAME")
            source_version = ENV["SOURCE_TAG"] || ENV.fetch("SOURCE_BRANCH")
            version = source_version.sub(/^#{Regexp.escape(source_name)}-/i, "")
            base_version = version.sub(/-rc[0-9]*/, "")
            build_date = Time.now.strftime("%Y.%m.%d_%H%M")

            puts "VER_FULL=#{version}"
            puts "VER_BASE=#{base_version}"
            puts "BUILD_DATE=#{build_date}"
            puts "RELEASE_TAG=#{source_name}-#{version}_#{build_date}"
          RUBY
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "${FIRMWARE_VERSION_ID}" >> version.buildinfo
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload Firmware To Release
        uses: softprops/action-gh-release@v3
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.FIRMWARE }}/*

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: openwrt-builder.yml

      - name: Cleanup Expired Releases
        if: steps.organize.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REPO="${{ github.repository }}"

          releases=$(gh release list --repo "$REPO" --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[].tagName')

          declare -A seen

          while IFS= read -r tag; do
            prefix="${SOURCE_NAME}-"
            [[ "$tag" == "$prefix"* ]] || continue

            version="${tag#$prefix}"
            base="${version%%_*}"
            base="${base%%-rc*}"

            if [[ "$base" == "$VER_BASE" ]]; then
              limit=2
            else
              limit=1
            fi

            count=${seen[$base]:-0}
            if (( count < limit )); then
              seen[$base]=$((count + 1))
            else
              echo "Deleting: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
            fi
          done <<< "$releases"
