name: Tags Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,13 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Fetch Latest Tags
        run: |
          get_remote_latest_tag() {
            local target_url="$1"
            local filter_enabled="$2"
            local tags_list
            tags_list=$(git ls-remote --tags --refs "$target_url" | grep -o 'refs/tags/[vV]*.*' | sed 's#refs/tags/##')
            if [[ "$filter_enabled" == "true" ]]; then
              tags_list=$(echo "$tags_list" | grep -Ev '\-(rc|alpha|beta|preview)')
            fi
            echo "$tags_list" | sort -V | tail -n1
          }

          GLOBAL_FILTER_RC=$(grep "^FILTER_RC=" .repo | cut -d'=' -f2)
          GLOBAL_FILTER_RC=${GLOBAL_FILTER_RC:-false}

          while IFS='=' read -r url_key remote_url; do
            package_name=${url_key%_URL}
            current_tag=$(grep "^${package_name}_TAG=" .repo | cut -d'=' -f2)
            package_filter_rc=$(grep "^${package_name}_FILTER_RC=" .repo | cut -d'=' -f2)
            final_filter_strategy=${package_filter_rc:-$GLOBAL_FILTER_RC}

            if [[ "$current_tag" =~ ^(main|master|dev|snapshot|openwrt-[0-9.]+.*)$ ]]; then
              echo "::notice::⏩ $package_name: skipping -> $current_tag"
              continue
            fi

            latest_tag=$(get_remote_latest_tag "$remote_url" "$final_filter_strategy")

            if [[ -z "$latest_tag" ]]; then
              echo "::warning::⚠️ $package_name: No tags found at $remote_url"
              continue
            fi

            if [[ "$latest_tag" != "$current_tag" ]] && \
               [[ "$(printf '%s\n%s' "$latest_tag" "$current_tag" | sort -V | head -1)" == "$current_tag" ]]; then
              sed -i "s|^${package_name}_TAG=.*|${package_name}_TAG=$latest_tag|" .repo
              echo "::notice::⬆️ $package_name: updated -> $latest_tag"
              commit_details="${commit_details:+$commit_details, }$package_name to $latest_tag"
              update_triggered=true
            else
              echo "::notice::✅ $package_name: current -> $current_tag"
            fi
          done < <(grep '_URL=' .repo | grep -v '^#')

          if [[ "$update_triggered" == "true" ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Update: $commit_details"
            git push
          fi

      - name: Delete Expired Workflows
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: tags-checker.yml
