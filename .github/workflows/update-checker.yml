name: Update Checker

on:
  push:
    paths:
      - '.repo'
      - '.config'
      - 'files/**'
      - '*.sh'
      - '!lxc.sh'
  schedule:
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Update Tracked Tags And SHAs
        run: |
          ruby <<'RUBY'
            require "open3"
            require "yaml"

            PRERELEASE_PATTERN = /-(rc|alpha|beta|preview)/
            SKIP_TAG_CHECK = /^(main|master|dev|snapshot|openwrt-[0-9.]+.*)$/

            def command_lines(*args, stdin_data: nil)
              output, status = Open3.capture2(*args, stdin_data: stdin_data)
              abort("#{args.join(" ")} failed") unless status.success?
              output.lines(chomp: true)
            end

            def git_lines(*args)
              command_lines("git", *args)
            end

            def version_key(tag)
              tag.gsub(PRERELEASE_PATTERN, "~\\1")
            end

            def sort_versions(tags)
              return [] if tags.empty?

              input = tags.map { |tag| version_key(tag) }.join("\n")
              command_lines("sort", "-V", stdin_data: input)
                .map { |tag| tag.gsub(/~(rc|alpha|beta|preview)/, "-\\1") }
            end

            def latest_tag(url, filter_rc)
              tags = git_lines("ls-remote", "--tags", "--refs", url)
                .filter_map { |line| line[/refs\/tags\/(.+)$/, 1] }
              tags.reject! { |tag| tag.match?(PRERELEASE_PATTERN) } if filter_rc
              sort_versions(tags).last
            end

            def newer?(latest, current)
              sort_versions([latest, current]).first == current && latest != current
            end

            def resolve_sha(url, ref)
              [
                "refs/heads/#{ref}",
                "refs/tags/#{ref}^{}",
                "refs/tags/#{ref}"
              ].each do |pattern|
                sha = git_lines("ls-remote", url, pattern).first&.split&.first
                return sha if sha && !sha.empty?
              end
              nil
            end

            def ordered_package(pkg)
              ordered = {
                "name" => pkg.fetch("name"),
                "url" => pkg.fetch("url"),
                "tag" => pkg.fetch("tag")
              }
              ordered["sha"] = pkg["sha"] if pkg["sha"]
              ordered["filter_rc"] = pkg["filter_rc"] if pkg.key?("filter_rc")
              ordered
            end

            def package_lines(pkg, indent:, list_item: false)
              name_prefix = list_item ? "#{indent}- " : indent
              field_prefix = list_item ? "#{indent}  " : indent
              lines = [
                "#{name_prefix}name: #{pkg.fetch("name")}",
                "#{field_prefix}url: #{pkg.fetch("url")}",
                "#{field_prefix}tag: #{pkg.fetch("tag")}"
              ]
              lines << "#{field_prefix}sha: #{pkg.fetch("sha")}" if pkg["sha"]
              lines << "#{field_prefix}filter_rc: #{pkg.fetch("filter_rc")}" if pkg.key?("filter_rc")
              lines
            end

            def dump_repo(repo)
              lines = ["source:"]
              lines.concat(package_lines(repo.fetch("source"), indent: "  "))
              lines << ""
              lines << "packages:"

              repo.fetch("packages").each_with_index do |pkg, index|
                lines << "" if index.positive?
                lines.concat(package_lines(pkg, indent: "  ", list_item: true))
              end

              lines << ""
              lines << "notes:"
              lines << "  filter_rc: \"Set false to include prerelease tags.\""
              lines.join("\n") + "\n"
            end

            def tracked_packages(repo)
              [repo.fetch("source"), *repo.fetch("packages")]
            end

            def run!(*args)
              system(*args) || abort("#{args.join(" ")} failed")
            end

            def repo_changed?
              _, status = Open3.capture2("git", "diff", "--quiet", "--", ".repo")
              return false if status.exitstatus == 0
              return true if status.exitstatus == 1

              abort("git diff --quiet -- .repo failed")
            end

            repo = YAML.load_file(".repo")
            packages = tracked_packages(repo)
            cache_parts = []
            first_pkg = nil

            File.open("sha_results.tmp", "w") do |sha_results|
              packages.each do |pkg|
                name = pkg.fetch("name")
                url = pkg.fetch("url")
                tag = pkg.fetch("tag")
                filter_rc = pkg.fetch("filter_rc", true)
                target_tag = tag

                if tag.match?(SKIP_TAG_CHECK)
                  puts "::notice::⏩ #{name}: skipping -> #{tag}"
                else
                  latest = latest_tag(url, filter_rc)

                  if latest.nil?
                    puts "::warning::⚠️ #{name}: no tags found at #{url}"
                  elsif newer?(latest, tag)
                    pkg["tag"] = latest
                    target_tag = latest
                    puts "::notice::⬆️ #{name}: updated -> #{latest}"
                  else
                    puts "::notice::✅ #{name}: up-to-date -> #{tag}"
                  end
                end

                sha = resolve_sha(url, target_tag)
                abort("#{name}: SHA not found for #{target_tag}") unless sha

                pkg["sha"] = sha
                sha_results.puts "#{name}_SHA=#{sha}"
                cache_parts << "#{name}-#{sha[0, 8]}"
                first_pkg ||= name
              end
            end

            repo["source"] = ordered_package(packages.first)
            repo["packages"] = packages.drop(1).map { |pkg| ordered_package(pkg) }
            File.write(".repo", dump_repo(repo))

            if repo_changed?
              run!("git", "config", "--global", "user.name", "github-actions[bot]")
              run!("git", "config", "--global", "user.email", "github-actions[bot]@users.noreply.github.com")
              run!("git", "add", ".repo")
              run!("git", "commit", "-m", "Update .repo")
              run!("git", "push")
            end

            File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
              env.puts "CACHE_KEY=#{cache_parts.join("/")}"
              env.puts "FIRST_PKG=#{first_pkg}"
            end
          RUBY

      - name: Restore Previous SHAs
        uses: actions/cache/restore@v6
        id: cache_previous
        with:
          path: .commit-shas/
          key: ${{ env.CACHE_KEY }}
          restore-keys: ${{ env.FIRST_PKG }}-

      - name: Compare SHAs
        run: |
          mkdir -p .commit-shas
          changes_detected=false

          while IFS='=' read -r pkg current_sha; do
            sha_file=".commit-shas/.${pkg}CommitSHA"

            if [[ -f "$sha_file" ]]; then
              previous_sha=$(cat "$sha_file")
              if [[ "$previous_sha" != "$current_sha" ]]; then
                echo "::notice::🔄 $pkg: changed -> $current_sha"
                changes_detected=true
              else
                echo "::notice::✅ $pkg: identical -> $current_sha"
              fi
            else
              echo "::notice::✨ $pkg: added -> $current_sha"
              changes_detected=true
            fi

            echo "$current_sha" > "$sha_file"
          done < <(sed 's/_SHA=/=/' sha_results.tmp)

          echo "CHANGES_DETECTED=$changes_detected" >> "$GITHUB_ENV"

      - name: Save Current SHAs
        if: env.CHANGES_DETECTED == 'true'
        uses: actions/cache/save@v6
        with:
          path: .commit-shas/
          key: ${{ env.CACHE_KEY }}

      - name: Trigger Builder If Needed
        run: |
          REPO="${{ github.repository }}"
          WF_NAME="OpenWrt Builder"

          WF_ID=$(gh api "repos/$REPO/actions/workflows" \
            --jq ".workflows[] | select(.name==\"$WF_NAME\") | .id")

          RUN_DATA=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?status=completed&per_page=1" \
            --jq '.workflow_runs[0]')
          LAST_CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion')
          LAST_RUN_TIME=$(echo "$RUN_DATA"   | jq -r '.updated_at')

          TRIGGER_REASON=""

          if [[ "$LAST_RUN_TIME" != "null" ]]; then
            TIME_DIFF=$(( ( $(date +%s) - $(date -d "$LAST_RUN_TIME" +%s) ) / 86400 ))
            echo "::notice::🕘 Last build: $(TZ="Asia/Shanghai" date -d "$LAST_RUN_TIME" '+%Y-%m-%d %H:%M:%S')"
            echo "::notice::🕒 Time diff: $TIME_DIFF days"

            if [[ "$CHANGES_DETECTED" == "true" ]]; then
              TRIGGER_REASON="changes detected"
            elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
              TRIGGER_REASON="push event"
            elif [[ "$LAST_CONCLUSION" != "success" ]]; then
              TRIGGER_REASON="last build $LAST_CONCLUSION"
            fi
          else
            echo "::notice::🕘 Last build: null"
            TRIGGER_REASON="no previous build"
          fi

          echo "::notice::🖥️ Trigger: ${TRIGGER_REASON:-none}"

          if [[ -n "$TRIGGER_REASON" ]]; then
            gh api -X POST "repos/$REPO/dispatches" -F "event_type=$WF_NAME"
          fi

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: update-checker.yml

      - name: Cleanup Dependabot Workflow Runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh run list --repo "$REPO" --user "dependabot[bot]" --limit 100 --json databaseId --jq '.[].databaseId' |
          while read -r run_id; do
            [ -n "$run_id" ] || continue
            echo "Deleting Dependabot workflow run: $run_id"
            gh api -X DELETE "repos/$REPO/actions/runs/$run_id"
          done
