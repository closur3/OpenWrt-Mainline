name: Update Checker

on:
  push:
    paths:
      - '.config'
      - 'files/**'
      - '*.sh'
  schedule:
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v1

      - name: Check And Update Tags
        run: |
          get_latest_tag() {
            local remote_url="$1"
            local filter_rc="$2"
            local tags

            tags=$(git ls-remote --tags --refs "$remote_url" \
              | grep -o 'refs/tags/[vV]*.*' \
              | sed 's#refs/tags/##')

            if [[ "$filter_rc" == "true" ]]; then
              tags=$(echo "$tags" | grep -Ev '\-(rc|alpha|beta|preview)')
            fi

            echo "$tags" \
              | sed -E 's/-(rc|alpha|beta|preview)/~\1/g' \
              | sort -V \
              | sed -E 's/~(rc|alpha|beta|preview)/-\1/g' \
              | tail -n1
          }

          is_newer() {
            local latest="$1"
            local current="$2"
            local older
            older=$(printf '%s\n%s' "$latest" "$current" \
              | sed -E 's/-(rc|alpha|beta|preview)/~\1/g' \
              | sort -V \
              | head -1 \
              | sed -E 's/~(rc|alpha|beta|preview)/-\1/g')
            [[ "$older" == "$current" && "$latest" != "$current" ]]
          }

          GLOBAL_FILTER_RC=$(grep "^FILTER_RC=" .repo | cut -d'=' -f2)
          GLOBAL_FILTER_RC=${GLOBAL_FILTER_RC:-false}
          commit_details=""
          update_triggered=false

          while IFS='=' read -r url_key remote_url; do
            pkg=${url_key%_URL}
            current_tag=$(grep "^${pkg}_TAG=" .repo | cut -d'=' -f2)
            pkg_filter_rc=$(grep "^${pkg}_FILTER_RC=" .repo | cut -d'=' -f2)
            filter_rc=${pkg_filter_rc:-$GLOBAL_FILTER_RC}

            if [[ "$current_tag" =~ ^(main|master|dev|snapshot|openwrt-[0-9.]+.*)$ ]]; then
              echo "::notice::⏩ $pkg: skipping -> $current_tag"
              continue
            fi

            latest_tag=$(get_latest_tag "$remote_url" "$filter_rc")

            if [[ -z "$latest_tag" ]]; then
              echo "::warning::⚠️ $pkg: no tags found at $remote_url"
              continue
            fi

            if is_newer "$latest_tag" "$current_tag"; then
              sed -i "s|^${pkg}_TAG=.*|${pkg}_TAG=$latest_tag|" .repo
              echo "::notice::⬆️ $pkg: updated -> $latest_tag"
              commit_details="${commit_details:+$commit_details, }$pkg to $latest_tag"
              update_triggered=true
            else
              echo "::notice::✅ $pkg: up-to-date -> $current_tag"
            fi
          done < <(grep '_URL=' .repo | grep -v '^#')

          if [[ "$update_triggered" == "true" ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Update: $commit_details"
            git push
          fi

      - name: Fetch Commit Hashes
        run: |
          cache_key=""
          first_pkg=""

          while IFS='=' read -r url_key remote_url; do
            [[ "$url_key" =~ ^# || -z "$url_key" ]] && continue

            pkg=${url_key%_URL}
            target_tag=$(grep "^${pkg}_TAG=" .repo | cut -d'=' -f2)

            latest_hash=$(git ls-remote "$remote_url" "refs/heads/$target_tag" | awk '{print $1}')
            if [[ -z "$latest_hash" ]]; then
              latest_hash=$(git ls-remote --tags "$remote_url" "$target_tag" | awk '{print $1}' | head -n1)
            fi

            if [[ -n "$latest_hash" ]]; then
              echo "${pkg}_HASH=$latest_hash" >> hash_results.tmp
              cache_key="${cache_key:+$cache_key/}${pkg}-${latest_hash:0:8}"
              [[ -z "$first_pkg" ]] && first_pkg="$pkg"
            fi
          done < <(grep '_URL=' .repo)

          echo "CACHE_KEY=$cache_key" >> "$GITHUB_ENV"
          echo "FIRST_PKG=$first_pkg" >> "$GITHUB_ENV"

      - name: Restore Previous Hashes
        uses: actions/cache/restore@v1
        id: cache_previous
        with:
          path: .commit-hashes/
          key: ${{ env.CACHE_KEY }}
          restore-keys: ${{ env.FIRST_PKG }}-

      - name: Compare Hashes
        run: |
          mkdir -p .commit-hashes
          changes_detected=false

          while IFS='=' read -r pkg current_hash; do
            hash_file=".commit-hashes/.${pkg}CommitHash"

            if [[ -f "$hash_file" ]]; then
              previous_hash=$(cat "$hash_file")
              if [[ "$previous_hash" != "$current_hash" ]]; then
                echo "::notice::🔄 $pkg: changed -> $current_hash"
                changes_detected=true
              else
                echo "::notice::✅ $pkg: identical -> $current_hash"
              fi
            else
              echo "::notice::✨ $pkg: added -> $current_hash"
              changes_detected=true
            fi

            echo "$current_hash" > "$hash_file"
          done < <(sed 's/_HASH=/=/' hash_results.tmp)

          echo "CHANGES_DETECTED=$changes_detected" >> "$GITHUB_ENV"

      - name: Save Cache
        if: env.CHANGES_DETECTED == 'true'
        uses: actions/cache/save@v1
        with:
          path: .commit-hashes/
          key: ${{ env.CACHE_KEY }}

      - name: Check Status And Trigger
        run: |
          REPO="${{ github.repository }}"
          WF_NAME="OpenWrt Builder"

          WF_ID=$(gh api "repos/$REPO/actions/workflows" \
            --jq ".workflows[] | select(.name==\"$WF_NAME\") | .id")

          RUN_DATA=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?status=completed&per_page=1" \
            --jq '.workflow_runs[0]')
          LAST_CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion')
          LAST_RUN_TIME=$(echo "$RUN_DATA"   | jq -r '.updated_at')

          TRIGGER_REASON=""

          if [[ "$LAST_RUN_TIME" != "null" ]]; then
            TIME_DIFF=$(( ( $(date +%s) - $(date -d "$LAST_RUN_TIME" +%s) ) / 86400 ))
            echo "::notice::🕘 Last build: $(TZ="Asia/Shanghai" date -d "$LAST_RUN_TIME" '+%Y-%m-%d %H:%M:%S')"
            echo "::notice::🕒 Time diff: $TIME_DIFF days"

            if [[ "${{ env.CHANGES_DETECTED }}" == "true" ]]; then
              TRIGGER_REASON="changes detected"
            elif [[ "${{ github.event_name }}" == "push" ]]; then
              TRIGGER_REASON="push event"
            elif [[ "$LAST_CONCLUSION" != "success" ]]; then
              TRIGGER_REASON="last build $LAST_CONCLUSION"
            fi
          else
            echo "::notice::🕘 Last build: null"
            TRIGGER_REASON="no previous build"
          fi

          echo "::notice::🖥️ Trigger: ${TRIGGER_REASON:-none}"

          if [[ -n "$TRIGGER_REASON" ]]; then
            gh api -X POST "repos/$REPO/dispatches" -F "event_type=$WF_NAME"
          fi

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: update-checker.yml
