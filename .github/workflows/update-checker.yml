name: Update Checker

on:
  push:
    branches:
      - main
    paths:
      - 'files/**'
      - '.config'
      - '.repo'
      - 'diy-part*.sh'
  schedule:
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:

concurrency:
  group: update-checker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  check:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Repository Input Parser
        run: python3 -m pip install 'ruamel.yaml==0.19.1'

      - name: Update Tracked Inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/repository-inputs.py update

      - name: Commit Repository Metadata
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          if git diff --quiet -- .repo; then
            changed=false
          else
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add .repo
            git commit -m "Update .repo"

            auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth" \
              push origin HEAD:refs/heads/main
            changed=true
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "config_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Trigger Builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_CHANGED: ${{ steps.metadata.outputs.changed }}
          CONFIG_COMMIT: ${{ steps.metadata.outputs.config_commit }}
        run: |
          REPO="${{ github.repository }}"
          WF_NAME="OpenWrt Builder"

          WF_ID=$(gh api "repos/$REPO/actions/workflows" \
            --jq ".workflows[] | select(.name==\"$WF_NAME\") | .id")

          LAST_CONCLUSION=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?status=completed&per_page=1" --jq '.workflow_runs[0].conclusion // "none"')

          TRIGGER_REASON=""

          if [[ "$REPO_CHANGED" == "true" ]]; then
            TRIGGER_REASON=".repo changed"
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            TRIGGER_REASON="push event"
          elif [[ "$LAST_CONCLUSION" == "none" ]]; then
            TRIGGER_REASON="no previous build"
          elif [[ "$LAST_CONCLUSION" != "success" ]]; then
            TRIGGER_REASON="last build $LAST_CONCLUSION"
          fi

          echo "::notice::🖥️ Last conclusion: $LAST_CONCLUSION"
          echo "::notice::🖥️ Trigger: ${TRIGGER_REASON:-none}"

          if [[ -n "$TRIGGER_REASON" ]]; then
            gh api -X POST "repos/$REPO/dispatches" \
              -f "event_type=$WF_NAME" \
              -f "client_payload[config_commit]=$CONFIG_COMMIT"
          fi

      - name: Cleanup Expired Workflows
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: update-checker.yml

      - name: Cleanup Dependabot Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh run list --repo "$REPO" --user "dependabot[bot]" --limit 100 --json databaseId --jq '.[].databaseId' |
          while read -r run_id; do
            [ -n "$run_id" ] || continue
            echo "Deleting Dependabot workflow run: $run_id"
            gh api -X DELETE "repos/$REPO/actions/runs/$run_id"
          done
