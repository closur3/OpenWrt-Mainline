name: Update Checker

on:
  push:
    branches:
      - main
    paths:
      - 'files/**'
      - '.config'
      - '.repo'
      - 'diy-part*.sh'
  schedule:
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:

concurrency:
  group: update-checker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  check:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Update Tracked Inputs
        id: inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -m pip install 'ruamel.yaml==0.19.1'
          python3 .github/scripts/repository-inputs.py update

      - name: Commit Tracked Inputs
        id: metadata
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ steps.inputs.outputs.commit_message }}
          file_pattern: .repo

      - name: Get Last Builder Run
        id: builder
        uses: octokit/request-action@v3.0.0
        with:
          route: GET /repos/${{ github.repository }}/actions/workflows/openwrt-builder.yml/runs?status=completed&per_page=1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report Builder Status
        env:
          REPO_CHANGED: ${{ steps.metadata.outputs.changes_detected }}
          LAST_CONCLUSION: ${{ fromJSON(steps.builder.outputs.data).workflow_runs[0].conclusion || 'none' }}
          LAST_RUN_TIME: ${{ fromJSON(steps.builder.outputs.data).workflow_runs[0].updated_at || 'null' }}
        run: |
          if [ "$LAST_RUN_TIME" = 'null' ]; then
            echo "::notice::🕘 Last build: null"
            echo "::notice::🕒 Time diff: 0 days"
          else
            echo "::notice::🕘 Last build: $(TZ='Asia/Shanghai' date -d "$LAST_RUN_TIME" '+%Y-%m-%d %H:%M:%S')"
            echo "::notice::🕒 Time diff: $(( ($(date +%s) - $(date -d "$LAST_RUN_TIME" +%s)) / 86400 )) days"
          fi

          if [ "$REPO_CHANGED" = 'true' ]; then
            trigger='.repo changed'
          elif [ "$GITHUB_EVENT_NAME" = 'push' ]; then
            trigger='push event'
          elif [ "$LAST_CONCLUSION" = 'none' ]; then
            trigger='no previous build'
          elif [ "$LAST_CONCLUSION" != 'success' ]; then
            trigger="last build $LAST_CONCLUSION"
          else
            trigger='none'
          fi

          echo "::notice::🖥️ Last conclusion: $LAST_CONCLUSION"
          echo "::notice::🖥️ Trigger: $trigger"

      - name: Trigger OpenWrt Builder
        if: >-
          steps.metadata.outputs.changes_detected == 'true' ||
          github.event_name == 'push' ||
          !contains(fromJSON(steps.builder.outputs.data).workflow_runs.*.conclusion, 'success')
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: OpenWrt Builder
          client-payload: '{"config_commit":"${{ steps.metadata.outputs.commit_hash || github.sha }}"}'

      - name: Cleanup Expired Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: update-checker.yml

      - name: Cleanup Dependabot Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_pattern: dependabot-updates
