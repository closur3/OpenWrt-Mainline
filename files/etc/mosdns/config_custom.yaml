log:
  level: info
  file: /tmp/mosdns.log

plugins:
  - tag: cache
    type: cache
    args:
      size: 8192
      lazy_cache_ttl: 86400
      dump_file: /etc/mosdns/cache.dump
      dump_interval: 600

  - tag: local_sequence
    type: sequence
    args:
      - exec: forward https://223.5.5.5/dns-query
      - matches: "!resp_ip &/var/mosdns/geoip_cn.txt"
        exec: drop_resp

  - tag: remote_sequence
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 0
      - exec: forward https://208.67.222.222/dns-query

  - tag: fallback
    type: fallback
    args:
      primary: local_sequence
      secondary: remote_sequence
      threshold: 500
      always_standby: true

  - tag: main
    type: sequence
    args:
      - matches: qtype 65
        exec: reject 0

      - exec: $cache
      - matches: has_resp
        exec: accept

      - matches: qtype 12
        exec: forward https://223.5.5.5/dns-query

      - matches: qname &/var/mosdns/geosite_cn.txt
        exec: $local_sequence
      - matches: has_resp
        exec: accept

      - matches: qname &/var/mosdns/geosite_geolocation-!cn.txt
        exec: $remote_sequence
      - matches: has_resp
        exec: accept

      - exec: $fallback

  - type: udp_server
    args:
      entry: main
      listen: :5522
