log:
  level: info
  file: /tmp/mosdns.log

plugins:
  - tag: local
    type: sequence
    args:
      - matches: qtype 65
        exec: reject 0
      - exec: forward https://223.5.5.5/dns-query

  - tag: remote
    type: sequence
    args:
      - matches: qtype 28 65
        exec: reject 0
      - exec: forward https://208.67.222.222/dns-query

  - type: udp_server
    args:
      entry: local
      listen: :5522

  - type: udp_server
    args:
      entry: remote
      listen: :5533